<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Draco AI</title>


    <!-- CSS -->

    <link rel="stylesheet" href="css/style.css">

    <link rel="stylesheet" href="css/layout.css">

    <link rel="stylesheet" href="css/draco.css">

    <link rel="stylesheet" href="css/panels.css">


</head>


<body>


<div id="app">


    <!-- Cabeçalho -->

    <header>

        <div>

            <h1>
                Draco AI
            </h1>


            <span>
                Sistema Online
            </span>


        </div>


    </header>




    <main>



        <!-- Núcleo visual do Draco -->

        <section id="draco-container">


            <div id="draco-core" class="draco-idle">


                <!-- Avatar controlado pelo CSS/JS -->

                <div id="draco-avatar-container">

                </div>



                <div id="draco-status">

                    Draco Online

                </div>



            </div>



        </section>






        <!-- Sistema de Chat -->

        <section id="chat-container">



            <div id="messages">



                <div class="message draco">


                    Olá Lucas, sou o Draco.


                </div>



            </div>





            <div id="input-area">


                <input
                    id="user-input"
                    type="text"
                    placeholder="Digite uma mensagem..."
                    autocomplete="off"
                >



                <button
                    id="voice-button"
                    title="Conversar por voz">

                    🎤

                </button>




                <button
                    id="send-button">

                    Enviar

                </button>



            </div>




        </section>





    </main>





</div>





<!-- JavaScript -->


<script src="js/api.js"></script>

<script src="js/draco.js"></script>

<script src="js/chat.js"></script>

<script src="js/voice.js"></script>

<script src="js/app.js"></script>



</body>


</html>
